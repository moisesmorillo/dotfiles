name: Lua Linting
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Luacheck (nvim)
        uses: lunarmodules/luacheck@v1
        with:
          args: nvim/

      - name: Luacheck (hammerspoon)
        uses: lunarmodules/luacheck@v1
        with:
          args: hammerspoon/
